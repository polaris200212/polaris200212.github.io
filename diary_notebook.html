<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人专栏与随笔</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --bg-color: #F0EFEB; --primary-green: #7D9087; --primary-brown: #8A7A6D; 
            --text-dark: #4A4643; --text-light: #FAF9F8; --border-color: #D8D4CC; 
        }
        body { 
            font-family: 'PingFang SC', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-dark); 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
        }
        .blog-container {
            width: 100%;
            max-width: 800px;
        }
        .page-title {
            color: var(--primary-green);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .article-card {
            background-color: var(--text-light);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }
        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        }
        .article-title {
            color: var(--primary-green);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .article-meta {
            color: var(--primary-brown);
            font-size: 13px;
            margin-bottom: 20px;
        }
        /* 优化文章正文的排版 */
        .article-content {
            line-height: 1.8;
            color: var(--text-dark);
            font-size: 16px;
        }
        .article-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 15px 0;
        }
        .article-content blockquote {
            border-left: 4px solid var(--primary-green);
            margin: 0;
            padding-left: 15px;
            color: var(--primary-brown);
            background-color: var(--bg-color);
            padding: 10px 15px;
            border-radius: 0 8px 8px 0;
        }
        .loading {
            text-align: center;
            color: var(--primary-brown);
            font-size: 16px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<div class="blog-container">
    <h1 class="page-title">📝 我的专栏与随笔</h1>
    
    <div id="article-list">
        <div class="loading">正在从 GitHub 获取最新文章，请稍候...</div>
    </div>
</div>

<script>
    // ==========================================
    // 🔴 必填区：填入你的 GitHub 信息！
    // ==========================================
    const GITHUB_USER = 'polaris200212'; 
    const GITHUB_REPO = 'polaris200212.github.io';
    const PUBLISH_LABEL = 'Published';
    // ==========================================

    async function fetchArticles() {
        // 请求地址：只获取带有 PUBLISH_LABEL 标签的 issues
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues?state=open&labels=${PUBLISH_LABEL}`;
        
        try {
            const response = await fetch(url);
            const issues = await response.json();
            
            const listContainer = document.getElementById('article-list');
            listContainer.innerHTML = ''; // 清空加载提示
            
            if(issues.length === 0) {
                listContainer.innerHTML = '<div class="loading">目前还没有发布任何文章哦。</div>';
                return;
            }

            issues.forEach(issue => {
                // 安全机制：防止别人在你的仓库里提 Issue 乱发文章，只显示你本人写的
                if(issue.user.login !== GITHUB_USER) return; 

                // 使用 marked.js 把 Markdown 正文转换为网页 HTML
                const bodyHtml = marked.parse(issue.body);
                // 格式化日期
                const date = new Date(issue.created_at).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

                // 生成文章卡片
                const articleHTML = `
                    <div class="article-card">
                        <h2 class="article-title">${issue.title}</h2>
                        <div class="article-meta">发布于 ${date}</div>
                        <div class="article-content">
                            ${bodyHtml}
                        </div>
                    </div>
                `;
                listContainer.innerHTML += articleHTML;
            });
            
        } catch (error) {
            document.getElementById('article-list').innerHTML = '<div class="loading" style="color:#C58782;">加载失败，请检查用户名和仓库名是否正确。</div>';
        }
    }

    // 网页加载时立刻执行
    fetchArticles();
</script>

</body>
</html>
